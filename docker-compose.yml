services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: frotika/app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-frotika}
      DB_USERNAME: ${DB_USERNAME:-frotika}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frotika

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - frotika

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: app
    image: frotika/app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-frotika}
      DB_USERNAME: ${DB_USERNAME:-frotika}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frotika

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-frotika}
      MYSQL_USER: ${DB_USERNAME:-frotika}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - frotika

volumes:
  mysql_data:
  app_storage:

networks:
  frotika:
    driver: bridge
